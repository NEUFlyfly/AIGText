<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0b0b2b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AIGText — 智能物联网助手</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/home.css">
</head>
<body class="home-body">

  <div class="home-page">

    <!-- Hero Logo -->
    <header class="home-hero">
      <h1 class="home-logo">AIGText</h1>
      <p class="home-subtitle">智能物联网助手</p>
    </header>

    <!-- Feature Cards -->
    <main class="home-cards">

      <!-- Card 1: Smart Q&A -->
      <article class="feature-card feature-card--qa" onclick="Nav.go('chat.html')" role="link" tabindex="0" aria-label="智能问答 — 点击进入聊天页面">
        <div class="feature-card__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/>
          </svg>
        </div>
        <div class="feature-card__body">
          <h2 class="feature-card__title">智能问答</h2>
          <p class="feature-card__desc">拍摄物联网设备，AI 实时识别并介绍设备功能与参数</p>
        </div>
        <div class="feature-card__arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>
      </article>

      <!-- Card 2: Learning Report -->
      <article class="feature-card feature-card--learning" onclick="Nav.go('learning.html')" role="link" tabindex="0" aria-label="学习报告 — 点击查看学习统计">
        <div class="feature-card__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
        </div>
        <div class="feature-card__body">
          <h2 class="feature-card__title">学习报告</h2>
          <p class="feature-card__desc">查看识别统计、设备分布图表和学习进度</p>
        </div>
        <div class="feature-card__arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>
      </article>

      <!-- Card 3: Knowledge Graph -->
      <article class="feature-card feature-card--graph" onclick="Nav.go('graph.html')" role="link" tabindex="0" aria-label="知识图谱 — 点击浏览设备知识网络">
        <div class="feature-card__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="2"/>
            <circle cx="6" cy="6" r="2"/>
            <circle cx="18" cy="6" r="2"/>
            <circle cx="6" cy="18" r="2"/>
            <circle cx="18" cy="18" r="2"/>
            <line x1="12" y1="10" x2="6" y2="8"/>
            <line x1="12" y1="10" x2="18" y2="8"/>
            <line x1="12" y1="14" x2="6" y2="16"/>
            <line x1="12" y1="14" x2="18" y2="16"/>
          </svg>
        </div>
        <div class="feature-card__body">
          <h2 class="feature-card__title">知识图谱</h2>
          <p class="feature-card__desc">可视化浏览物联网设备关系网络与分类体系</p>
        </div>
        <div class="feature-card__arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>
      </article>

    </main>

    <!-- Footer: Health + Badge -->
    <footer class="home-footer">
      <div class="health-indicator">
        <span id="health-dot" class="health-dot" title="后端服务连接状态" aria-label="服务器连接状态"></span>
        <span id="health-label">检测中…</span>
      </div>
      <div class="home-badge" aria-label="Powered by Local AI">
        <span class="home-badge__dot"></span>
        <span>Powered by Local AI</span>
      </div>
    </footer>

  </div>

  <script src="js/common.js?v=20260701"></script>
  <script>
    (function () {
      var dot = document.getElementById('health-dot');
      var label = document.getElementById('health-label');

      function check() {
        API.health().then(function (ok) {
          if (ok) {
            dot.classList.add('health-dot--connected');
            label.textContent = '服务已连接';
          } else {
            dot.classList.remove('health-dot--connected');
            label.textContent = '服务未连接';
          }
        }).catch(function () {
          dot.classList.remove('health-dot--connected');
          label.textContent = '服务未连接';
        });
      }

      check();
      setInterval(check, 30000);
    })();
  </script>

</body>
</html>
