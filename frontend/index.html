<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f0f2f5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>AIGText — Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <header id="header">
      <h1 class="header-title">AIGText</h1>
      <div class="header-actions">
        <button id="new-chat-btn" class="icon-btn" title="新对话" aria-label="开始新对话">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
        <span id="health-dot" class="health-dot" title="连接状态" aria-label="服务器连接状态"></span>
      </div>
    </header>

    <div id="rag-bar">
      <label class="rag-toggle" aria-label="RAG 检索增强">
        <span class="rag-label">RAG</span>
        <input type="checkbox" id="rag-switch" checked>
        <span class="rag-slider"></span>
      </label>
    </div>

    <main id="messages" aria-live="polite" aria-label="聊天消息">
      <div id="empty-state" class="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"></path>
          </svg>
        </div>
        <h2 class="empty-title">AIGText</h2>
        <p class="empty-subtitle">本地 LLM 聊天助手</p>
      </div>
    </main>

    <footer id="input-bar">
      <div class="input-wrapper">
        <textarea
          id="message-input"
          placeholder="输入消息..."
          rows="1"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          aria-label="消息输入"
        ></textarea>
        <button id="send-button" class="action-btn" aria-label="发送" title="发送 (Enter)">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
        <button id="stop-button" class="action-btn stop-btn hidden" aria-label="停止生成" title="停止生成">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="6" width="12" height="12" rx="2"/>
          </svg>
        </button>
      </div>
    </footer>

  </div>
  <script src="app.js"></script>
</body>
</html>
