<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#f5f5f5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>AIGText — 3D 建模</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/modeling.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div class="page" id="modeling-page">

    <!-- Navigation Bar -->
    <nav class="nav-bar">
      <button class="nav-bar__back" aria-label="返回">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <span class="nav-bar__title">3D 建模</span>
      <span class="nav-bar__spacer"></span>
    </nav>

    <!-- ================================================================
         MODE 1: Upload / Scan
         ================================================================ -->
    <div class="mode mode--upload" id="mode-upload">
      <div class="scroll-area">
        <div class="upload-content">

          <!-- Drop Zone -->
          <div class="drop-zone" id="drop-zone">
            <div class="drop-zone__inner">
              <div class="drop-zone__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"></path>
                  <circle cx="12" cy="13" r="4"></circle>
                </svg>
              </div>
              <p class="drop-zone__text">点击上传照片 或 使用相机扫描</p>
              <p class="drop-zone__hint">请从不同角度拍摄，最多 6 张</p>
            </div>
          </div>

          <!-- Hidden File Input -->
          <input
            type="file"
            id="file-input"
            accept="image/*"
            multiple
            class="hidden"
          >

          <!-- Action Buttons -->
          <div class="upload-actions">
            <button class="btn btn--secondary upload-actions__btn" id="btn-camera">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"></path>
                <circle cx="12" cy="13" r="4"></circle>
              </svg>
              拍摄照片
            </button>
            <button class="btn btn--secondary upload-actions__btn" id="btn-gallery">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
              </svg>
              选择文件
            </button>
          </div>

          <!-- Thumbnail Grid -->
          <div class="thumb-grid" id="thumb-grid"></div>

          <!-- Photo Count -->
          <p class="photo-count text-muted" id="photo-count">已选择 0/6 张照片</p>

          <!-- Start Modeling Button -->
          <button class="btn btn--primary btn--large btn--full" id="btn-start" disabled>
            开始建模
          </button>

        </div>
      </div>
    </div>

    <!-- ================================================================
         MODE 2: Loading
         ================================================================ -->
    <div class="mode mode--loading hidden" id="mode-loading">
      <div class="loading-overlay">
        <div class="loading-card">
          <div class="spinner spinner--large"></div>
          <p class="loading-card__title">正在生成 3D 模型...</p>
          <p class="loading-card__subtitle">预计 2-5 分钟</p>
          <div class="progress-bar">
            <div class="progress-bar__fill" id="progress-fill"></div>
          </div>
          <button class="btn btn--ghost loading-card__cancel" id="btn-cancel">
            取消
          </button>
        </div>
      </div>
    </div>

    <!-- ================================================================
         MODE 3: 3D Viewer
         ================================================================ -->
    <div class="mode mode--viewer hidden" id="mode-viewer">
      <!-- Three.js Canvas Container -->
      <div class="viewer-canvas" id="viewer-canvas"></div>

      <!-- Model Info Bar -->
      <div class="viewer-info">
        <div class="viewer-info__row">
          <span class="viewer-info__label">模型名称</span>
          <span class="viewer-info__value" id="model-name">我的模型</span>
        </div>
        <div class="viewer-info__row">
          <span class="viewer-info__label">状态</span>
          <span class="viewer-info__status">已完成</span>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="viewer-actions">
        <button class="btn btn--secondary" id="btn-remodel">
          重新建模
        </button>
        <button class="btn btn--primary" id="btn-ar" onclick="location.href='ar.html'">
          AR 预览
        </button>
      </div>
    </div>

  </div>

  <script src="js/common.js"></script>
  <script src="js/modeling.js"></script>
</body>
</html>
