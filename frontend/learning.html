<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0b0b2b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>IoTBrain — 学习报告</title>
  <link rel="stylesheet" href="css/common.css?v=20260702">
  <link rel="stylesheet" href="css/learning.css?v=20260702">
</head>
<body class="learning-body">

  <div id="app" class="learning-app">

    <!-- Header -->
    <header id="learning-header">
      <button id="back-btn" class="nav-bar__back" aria-label="返回" title="返回">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <h1 class="learning-title">我的学习</h1>
    </header>

    <!-- Stats Cards -->
    <section class="stats-grid" id="stats-grid">
      <div class="stat-card stat-card--count">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
        </div>
        <div class="stat-value" id="stat-count">0</div>
        <div class="stat-label">本周识别设备</div>
      </div>
      <div class="stat-card stat-card--streak">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 10 10-12h-9l1-10z"/></svg>
        </div>
        <div class="stat-value" id="stat-top">—</div>
        <div class="stat-label">最常识别</div>
      </div>
      <div class="stat-card stat-card--days">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <div class="stat-value" id="stat-days">0 天</div>
        <div class="stat-label">学习天数</div>
      </div>
    </section>

    <!-- Charts Section -->
    <section class="charts-section">
      <h2 class="section-title">设备分类分布</h2>
      <div class="chart-wrapper">
        <canvas id="category-chart"></canvas>
      </div>
    </section>

    <section class="charts-section">
      <h2 class="section-title">每日识别趋势</h2>
      <div class="chart-wrapper">
        <canvas id="daily-chart"></canvas>
      </div>
    </section>

    <!-- Recent Conversations -->
    <section class="recent-section">
      <h2 class="section-title">最近聊过</h2>
      <div id="recent-list" class="recent-list"></div>
    </section>

    <!-- Action Buttons -->
    <section class="action-section">
      <button id="review-btn" class="action-btn action-btn--primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        一键复习上次聊过的内容
      </button>
    </section>

    <!-- Empty State -->
    <div id="empty-state" class="empty-state hidden">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
      </div>
      <h3 class="empty-title">还没有学习记录</h3>
      <p class="empty-subtitle">去聊天页面上传设备图片开始你的学习之旅吧</p>
      <button class="start-btn" onclick="Nav.go('chat.html')">开始聊天</button>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="js/common.js?v=20260701"></script>
  <script src="js/learning.js?v=20260702"></script>
</body>
</html>
